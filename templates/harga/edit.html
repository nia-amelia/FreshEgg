{% extends 'base.html' %}

{% block title %}
Edit Harga Telur
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-7">

        <div class="card border-0 shadow-sm">

            <div class="card-header bg-transparent border-0 pt-4">

                <h3 class="mb-1">
                    ✏️ Edit Harga Telur
                </h3>

                <p class="text-muted mb-0">
                    Perbarui harga telur per kilogram
                </p>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            <i class="bi bi-calendar-event"></i>
                            Tanggal

                        </label>

                        <input type="date"
                               name="tanggal"
                               class="form-control"
                               value="{{ harga[1] }}"
                               required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            <i class="bi bi-cash-coin"></i>
                            Harga per Kg

                        </label>

                        <input type="number"
                               step="0.01"
                               name="harga_per_kg"
                               class="form-control"
                               value="{{ harga[2] }}"
                               required>

                        <div class="form-text">

                            Harga telur saat ini dalam Rupiah per kilogram.

                        </div>

                    </div>

                    <div class="d-flex gap-2">

                        <a href="/harga"
                           class="btn btn-outline-secondary flex-fill">

                            <i class="bi bi-arrow-left"></i>
                            Kembali

                        </a>

                        <button type="submit"
                                class="btn btn-warning flex-fill">

                            <i class="bi bi-check-circle"></i>
                            Update

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
