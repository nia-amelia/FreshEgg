{% extends 'base.html' %}

{% block title %}
Input Harga Telur
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-7">

        <div class="card border-0 shadow-sm">

            <div class="card-header bg-transparent border-0 pt-4">

                <h3 class="mb-1">
                    💰 Input Harga Telur
                </h3>

                <p class="text-muted mb-0">
                    Tambahkan harga telur terbaru per kilogram
                </p>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            <i class="bi bi-calendar-event"></i>
                            Tanggal

                        </label>

                        <input type="date"
                               name="tanggal"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            <i class="bi bi-cash-coin"></i>
                            Harga per Kg

                        </label>

                        <input type="number"
                               step="0.01"
                               name="harga"
                               class="form-control"
                               placeholder="Contoh: 29000"
                               required>

                        <div class="form-text">

                            Masukkan harga telur per kilogram (Rp).

                        </div>

                    </div>

                    <div class="d-flex gap-2">

                        <a href="/harga"
                           class="btn btn-outline-secondary flex-fill">

                            <i class="bi bi-arrow-left"></i>
                            Kembali

                        </a>

                        <button type="submit"
                                class="btn btn-warning flex-fill">

                            <i class="bi bi-save"></i>
                            Simpan

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
