{% extends 'base.html' %}

{% block title %}
Input Penjualan
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-7">

        <div class="card border-0 shadow-sm">

            <div class="card-header bg-transparent border-0 pt-4">

                <h3 class="mb-1">
                    💰 Input Penjualan
                </h3>

                <p class="text-muted mb-0">
                    Tambahkan data penjualan telur
                </p>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            <i class="bi bi-calendar-event"></i>
                            Tanggal

                        </label>

                        <input type="date"
                               name="tanggal"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            <i class="bi bi-person-fill"></i>
                            Nama Pembeli

                        </label>

                        <input type="text"
                               name="pembeli"
                               class="form-control"
                               placeholder="Masukkan nama pembeli"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            <i class="bi bi-box-seam"></i>
                            Jumlah Terjual (Kg)

                        </label>

                        <input type="number"
                               step="0.01"
                               name="jumlah_kg"
                               class="form-control"
                               placeholder="Contoh: 15.5"
                               required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            <i class="bi bi-card-text"></i>
                            Keterangan

                        </label>

                        <textarea name="keterangan"
                                  class="form-control"
                                  rows="3"
                                  placeholder="Opsional"></textarea>

                    </div>

                    <div class="d-flex gap-2">

                        <a href="/penjualan"
                           class="btn btn-outline-secondary flex-fill">

                            <i class="bi bi-arrow-left"></i>
                            Kembali

                        </a>

                        <button type="submit"
                                class="btn btn-warning flex-fill">

                            <i class="bi bi-save"></i>
                            Simpan

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
