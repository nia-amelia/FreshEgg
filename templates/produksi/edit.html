{% extends 'base.html' %}

{% block title %}
Edit Produksi
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-7">

        <div class="card border-0 shadow-sm">

            <div class="card-header bg-transparent border-0 pt-4">

                <h3 class="mb-1">
                    ✏️ Edit Produksi
                </h3>

                <p class="text-muted mb-0">
                    Perbarui data produksi harian
                </p>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            <i class="bi bi-calendar-event"></i>
                            Tanggal

                        </label>

                        <input type="date"
                               name="tanggal"
                               class="form-control"
                               value="{{ produksi[1] }}"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            <i class="bi bi-house-door"></i>
                            Kandang

                        </label>

                        <select name="kandang_id"
                                class="form-select">

                            {% for kandang in kandangs %}

                            <option value="{{ kandang[0] }}"
                                {% if kandang[0] == produksi[2] %}
                                    selected
                                {% endif %}>

                                {{ kandang[1] }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            <i class="bi bi-egg-fill"></i>
                            Jumlah Telur

                        </label>

                        <input type="number"
                               name="jumlah_telur"
                               class="form-control"
                               value="{{ produksi[3] }}"
                               required>

                    </div>

                    <div class="d-flex gap-2">

                        <a href="/produksi"
                           class="btn btn-outline-secondary flex-fill">

                            <i class="bi bi-arrow-left"></i>
                            Kembali

                        </a>

                        <button type="submit"
                                class="btn btn-warning flex-fill">

                            <i class="bi bi-check-circle"></i>
                            Update

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
